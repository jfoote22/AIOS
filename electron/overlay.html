<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AIOS — Snip</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; cursor: crosshair; user-select: none; background: transparent; font-family: ui-sans-serif, system-ui, sans-serif; }
      #screenshot { position: absolute; inset: 0; width: 100vw; height: 100vh; pointer-events: none; }
      #dim { position: absolute; inset: 0; background: rgba(0,0,0,0.4); pointer-events: none; }
      #marquee { position: absolute; border: 2px solid #6366f1; box-shadow: 0 0 0 9999px rgba(0,0,0,0.55); display: none; }
      #size-tag { position: absolute; top: -22px; right: 0; background: #4f46e5; color: white; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 6px; text-transform: uppercase; }
      #hint { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 22px; border-radius: 999px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; border: 1px solid rgba(99,102,241,0.4); }
      #hint .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6366f1; margin-right: 10px; vertical-align: middle; animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
  </head>
  <body>
    <img id="screenshot" />
    <div id="dim"></div>
    <div id="marquee"><div id="size-tag">0 × 0</div></div>
    <div id="hint"><span class="dot"></span>Drag to snip · Esc to cancel</div>
    <script src="./overlay.js"></script>
  </body>
</html>
